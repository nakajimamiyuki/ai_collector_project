[pytest]
# 测试发现：tests/ 目录下的 test_*.py
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出更清晰
addopts = -v --tb=short --strict-markers

# pytest-asyncio：自动识别 async 测试函数
asyncio_mode = auto

# 自定义标记（避免 --strict-markers 报警）
markers =
    unit: 纯单元测试，无外部依赖（网络/LLM/浏览器），可离线跑
    integration: 集成测试，可能需要真实外部资源
